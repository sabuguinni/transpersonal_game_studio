[/Script/Engine.GameUserSettings]
; TranspersonalGame — DefaultScalability.ini
; Validated by Agent #04 Performance Optimizer — PROD_CYCLE_AUTO_20260622_010
; Targets: 60fps PC (high-end) / 30fps Console

[ScalabilityGroups]
sg.ResolutionQuality=100
sg.ViewDistanceQuality=3
sg.AntiAliasingQuality=3
sg.ShadowQuality=3
sg.GlobalIlluminationQuality=3
sg.ReflectionQuality=3
sg.PostProcessQuality=3
sg.TextureQuality=3
sg.EffectsQuality=3
sg.FoliageQuality=3
sg.ShadingQuality=3

[SystemSettings]
; === TARGET FRAMERATE ===
t.MaxFPS=60
r.VSync=1

; === DYNAMIC RESOLUTION SCALING ===
; Maintains 60fps by scaling resolution 70-100%
r.DynamicRes.Enable=1
r.DynamicRes.MinScreenPercentage=70
r.DynamicRes.MaxScreenPercentage=100
r.DynamicRes.FrameTimeBudget=16.6
r.DynamicRes.OperationMode=1
r.ScreenPercentage=100

; === LUMEN GI (Balanced for outdoor dinosaur world) ===
r.Lumen.DiffuseIndirect.Allow=1
r.Lumen.Reflections.Allow=1
r.Lumen.TraceMeshSDFs=1
r.Lumen.MaxTraceDistance=20000
r.Lumen.SceneCaptureCacheResolution=64
r.Lumen.DiffuseIndirect.SurfaceCacheFeedback=1

; === NANITE (Static meshes: terrain, rocks, trees) ===
r.Nanite=1
r.Nanite.MaxPixelsPerEdge=1.0
r.Nanite.ProxyTrianglePercent=1.0

; === SHADOW QUALITY (CSM — outdoor sun shadows) ===
r.Shadow.MaxResolution=2048
r.Shadow.CSM.MaxCascades=4
r.Shadow.RadiusThreshold=0.03
r.Shadow.DistanceScale=1.0
r.Shadow.CSMDepthBias=10

; === TEXTURE STREAMING ===
r.Streaming.PoolSize=2000
r.Streaming.MaxTempMemoryAllowed=50
r.Streaming.HiddenPrimitiveScale=0.5

; === DRAW CALL REDUCTION ===
r.DrawDistanceScale=1.0
r.MeshDrawCommands.DynamicInstancing=1
r.MeshDrawCommands.UseCachedCommands=1

; === OCCLUSION CULLING ===
r.AllowOcclusionQueries=1
r.HZBOcclusion=1

; === LOD SETTINGS ===
r.StaticMesh.LODDistanceScale=1.0
r.SkeletalMesh.LODBias=0
foliage.LODDistanceScale=1.0

; === SKY ATMOSPHERE (performance fix) ===
r.SkyAtmosphere.FastSkyLUT=1
r.SkyAtmosphere.AerialPerspectiveLUT.FastApply=1

; === CONSOLE PLATFORM OVERRIDES ===
; Applied via platform-specific .ini (DefaultScalability_Console.ini)
; Console targets: sg.*=2, DRS min=60%, MaxFPS=30

[ConsoleVariables]
; Survival game specific — reduce overhead for large open world
r.Shadow.Virtual.Enable=1
r.Shadow.Virtual.ResolutionLodBiasLocal=-1
r.Shadow.Virtual.ResolutionLodBiasDirectional=-1
