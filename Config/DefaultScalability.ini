; DefaultScalability.ini
; Performance Optimizer Agent #04 — Transpersonal Game Studio
; Target: 60fps PC (high-end) / 30fps Console
; Cycle: PROD_CYCLE_AUTO_20260622_008

[ScalabilityGroups]
; PC High-End (default — Epic quality with perf guards)
sg.ResolutionQuality=100
sg.ViewDistanceQuality=3
sg.AntiAliasingQuality=3
sg.ShadowQuality=3
sg.GlobalIlluminationQuality=3
sg.ReflectionQuality=3
sg.PostProcessQuality=3
sg.TextureQuality=3
sg.EffectsQuality=3
sg.FoliageQuality=3
sg.ShadingQuality=3

[/Script/Engine.RendererSettings]
; Lumen Global Illumination (replaces baked lighting)
r.Lumen.Reflections.Allow=1
r.Lumen.DiffuseIndirect.Allow=1
r.Lumen.TraceMeshSDFs.Allow=1
r.Lumen.ScreenProbeGather.RadianceCache.NumProbeTracesBudget=200

; Nanite virtualised geometry
r.Nanite.MaxPixelsPerEdge=1.0
r.Nanite.Tessellation=0

; TSR Temporal Super Resolution (AA method 4)
r.AntiAliasingMethod=4
r.TSR.History.ScreenPercentage=200

; Shadow quality
r.Shadow.MaxResolution=2048
r.Shadow.RadiusThreshold=0.03
r.Shadow.DistanceScale=0.8

; Occlusion culling
r.AllowOcclusionQueries=1
r.HZBOcclusion=1

; LOD
r.LODFadeTime=0.5
r.StaticMeshLODDistanceScale=1.0

; Sky atmosphere
r.SkyAtmosphere.FastSkyLUT=1
r.SkyAtmosphere.AerialPerspectiveLUT.FastApply=1

[/Script/Engine.StreamingSettings]
; Texture streaming pool
r.Streaming.PoolSize=512
r.Streaming.MaxTempMemoryAllowed=50
r.Streaming.HiddenPrimitiveScale=0.5

; Async loading
s.AsyncLoadingThreadEnabled=1
s.AsyncLoadingTimeLimit=5

[/Script/Engine.GarbageCollectionSettings]
; GC tuning for large open world
gc.TimeBetweenPurgingPendingKillObjects=60
gc.MaxObjectsInGame=2000000

[/Script/Engine.Engine]
; Frame rate
t.MaxFPS=60
t.UnacceptableFrameTime=33.3

; World Partition streaming
wp.Runtime.UpdateStreamingStateToWorld=1

