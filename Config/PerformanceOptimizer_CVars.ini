; PerformanceOptimizer_CVars.ini
; Agent #4 — Performance Optimizer
; Target: 60fps PC (high-end) / 30fps Console
; Cycle: PROD_CYCLE_AUTO_20260626_010
; Applied via UE5 console on map load and validated each cycle.

[/Script/Engine.RendererSettings]
; Lumen Global Illumination
r.DynamicGlobalIlluminationMethod=1
r.Lumen.Reflections.Allow=1

; Shadow quality (balanced for performance)
r.Shadow.MaxCSMResolution=1024
r.Shadow.RadiusThreshold=0.03
r.Shadow.DistanceScale=1.0

; Sky atmosphere
r.SkyAtmosphere.FastSkyLUT=1

; Texture filtering
r.MaxAnisotropy=8

; LOD settings
r.LODDistanceFactor=1.0
r.SkeletalMeshLODBias=0
r.ForceLOD=-1
r.StaticMeshLODDistanceScale=1.0

[/Script/Engine.AnimationSettings]
; Uniform Rate of Update — reduces animation tick cost for distant characters
a.URO.Enable=1
a.URO.MaxInterpolation=1

[/Script/AIModule.AIPerceptionSystem]
; Limit per-frame perception processing to cap AI CPU cost
ai.PerceptionSystem.MaxNumberOfActorsToProcess=10
ai.PerceptionSystem.UpdateInterval=0.1
ai.PerceptionSystem.MaxStimuliAge=5.0
ai.sight.MaxRequestsPerFrame=5

; Navigation
ai.Navigation.MaxSimultaneousPathRequests=10

; Crowd simulation cap
ai.crowd.MaxAgents=50

[/Script/Engine.NavigationSystem]
; NavMesh tile size — balance between memory and query speed
NavigationSystem.MaxSimultaneousNavDataBuilds=1

; ── FRAME BUDGET TARGETS ──────────────────────────────────────────────────────
; PC (60fps = 16.6ms budget):
;   Dino AI (5x) tick:       ~1.5ms
;   NavMesh queries:          ~0.5ms
;   Perception system:        ~0.2ms
;   Lumen + shadows:          ~8.0ms
;   Character movement:       ~0.5ms
;   Misc (UI, audio, etc):    ~1.0ms
;   TOTAL:                   ~11.7ms  (29% headroom)
;
; Console (30fps = 33.3ms budget):
;   Same systems at reduced quality settings
;   TOTAL:                   ~22ms    (34% headroom)
; ─────────────────────────────────────────────────────────────────────────────
