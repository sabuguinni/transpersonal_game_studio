[/Script/Engine.RendererSettings]
; === TRANSPERSONAL GAME — PERFORMANCE CONFIGURATION ===
; Target: 60fps PC (RTX 3070+) / 30fps Console (PS5/XSX)
; Maintained by: Agent #4 Performance Optimizer

; --- LUMEN GLOBAL ILLUMINATION ---
r.DynamicGlobalIlluminationMethod=1
r.Lumen.GlobalIllumination.Allow=1
r.Lumen.Reflections.Allow=1
r.Lumen.TraceMeshSDFs=1
r.Lumen.ScreenProbeGather.RadianceCache.NumProbesToTraceBudget=200
r.Lumen.ScreenProbeGather.DownsampleFactor=2
r.Lumen.ScreenProbeGather.FullResolutionJitterWidth=1

; --- NANITE ---
r.Nanite.MaxPixelsPerEdge=1.0
r.Nanite.ProjectedNaniteSizeFactor=1.0

; --- SHADOWS ---
r.Shadow.MaxResolution=2048
r.Shadow.RadiusThreshold=0.03
r.Shadow.DistanceScale=1.0
r.CapsuleShadows=1

; --- SKY & ATMOSPHERE ---
r.SkyAtmosphere.FastSkyLUT=1
r.VolumetricFog=1
r.VolumetricFog.GridPixelSize=8
r.VolumetricFog.GridSizeZ=64

; --- OCCLUSION CULLING ---
r.AllowOcclusionQueries=1
r.HZBOcclusion=1

; --- LOD ---
r.StaticMeshLODDistanceScale=1.0
r.SkeletalMeshLODBias=0
foliage.LODDistanceScale=1.5
r.MipMapLODBias=0

; --- TEXTURE STREAMING ---
r.Streaming.PoolSize=2048
r.Streaming.MaxTempMemoryAllowed=50

; --- ANTI-ALIASING ---
r.AntiAliasingMethod=4
r.TemporalAA.Upsampling=1
r.TSR.History.ScreenPercentage=200

