; DefaultPerformance.ini — Transpersonal Game Studio
; Agent #04 Performance Optimizer — PROD_CYCLE_AUTO_20260623_002
; Applied to MinPlayableMap and all future maps
; Target: 60fps PC / 30fps Console

[/Script/Engine.RendererSettings]
r.HZBOcclusion=1
r.AllowOcclusionQueries=1
r.OcclusionQueryLocation=1
r.ForceLOD=-1
r.ViewDistanceScale=1.0
r.StaticMeshLODDistanceScale=1.0
r.SkeletalMeshLODBias=0
r.MaxAnisotropy=8
r.Streaming.PoolSize=2048
r.Streaming.MaxTempMemoryAllowed=50
r.AsyncComputeBarriers=1
r.Shadow.MaxCSMResolution=2048
r.Shadow.CSMDepthBias=10
r.Shadow.DistanceScale=1.0
r.Lumen.Reflections.Allow=1
r.Lumen.GlobalIllumination.Allow=1
r.Nanite=1
r.SkyAtmosphere.FastSkyLUT=1
r.SkyAtmosphere.AerialPerspectiveLUT.FastApply=1

[/Script/Engine.GarbageCollectionSettings]
gc.TimeBetweenPurgingPendingKillObjects=60

[/Script/Engine.PhysicsSettings]
p.MaxSubsteps=2
p.MaxPhysicsDeltaTime=0.033

[/Script/Engine.WorldPartitionSettings]
wp.Runtime.UpdateStreamingPerFrame=4

[/Script/Engine.FoliageSettings]
foliage.MinimumScreenSize=0.0002

[SystemSettings]
