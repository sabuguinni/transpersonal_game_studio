; DefaultPerformance.ini
; Transpersonal Game Studio — Prehistoric Survival Game
; Agent #04 Performance Optimizer — PROD_CYCLE_AUTO_20260622_006
; Target: 60fps PC (high-end) / 30fps Console
; Applied via UE5 CVars — validated in MinPlayableMap

[/Script/Engine.RendererSettings]
; Shadow quality — 1024 max resolution balances quality vs GPU cost
r.Shadow.MaxResolution=1024
r.Shadow.RadiusThreshold=0.03

; LOD — neutral bias, let mesh LOD settings drive transitions
r.StaticMeshLODDistanceScale=1.0
r.SkeletalMeshLODBias=0
r.ForceLOD=-1

; Occlusion culling — HZB is most accurate, essential for dense foliage scenes
r.HZBOcclusion=1

; Texture streaming — 1GB pool covers all biome textures simultaneously
r.Streaming.PoolSize=1024

; Lumen — enabled for realistic prehistoric lighting (caves, forest canopy)
r.Lumen.Reflections.Allow=1
r.Lumen.DiffuseIndirect.Allow=1
r.Lumen.TraceMeshSDFs.Allow=1

; Post-process quality — balanced for 60fps
r.MaxAnisotropy=8
r.DepthOfFieldQuality=2
r.BloomQuality=4
r.AmbientOcclusionLevels=2

; Sky atmosphere — fast LUT avoids per-pixel atmosphere cost
r.SkyAtmosphere.FastSkyLUT=1
r.SkyAtmosphere.AerialPerspectiveLUT.FastApply=1

; GPU busy-wait disabled — avoids CPU stall waiting for GPU
r.GPUBusyWait=0

[/Script/Engine.GameEngine]
; Frame rate cap — 60fps PC target
t.MaxFPS=60
t.UnacceptableFrameTime=0.05

