; DefaultPerformance.ini
; Transpersonal Game Studio — Performance Optimizer Agent #4
; Target: 60fps PC High-end / 30fps Console
; Generated: PROD_CYCLE_AUTO_20260628_009

[/Script/Engine.RendererSettings]
; Lumen — Software GI (no hardware RT requirement)
r.Lumen.HardwareRayTracing=0
r.Lumen.TraceMeshSDFs=1
r.Lumen.MaxTraceDistance=20000
r.Lumen.Scene.SurfaceCacheResolution=1.0
r.Lumen.Reflections.Allow=1
r.Lumen.DiffuseIndirect.Allow=1
r.Lumen.GlobalIllumination.Allow=1

; Virtual Shadow Maps
r.Shadow.Virtual.Enable=1
r.Shadow.Virtual.Cache.StaticSeparate=1
r.Shadow.DistanceScale=0.8
r.Shadow.MaxCSMResolution=2048

; Temporal Super Resolution (TSR) — render at 75%, upscale to native
r.TemporalAA.Upsampling=1
r.ScreenPercentage=75

; Occlusion culling
r.AllowOcclusionQueries=1
r.HZBOcclusion=1
r.OcclusionCullParallelRecursive=1

; Distance Field AO
r.DistanceFieldAO=1
r.AOGlobalDistanceField.MaxAOBias=0.5

; Texture streaming
r.Streaming.PoolSize=2048
r.Streaming.MaxTempMemoryAllowed=256

; Sky atmosphere
r.SkyAtmosphere.FastSkyLUT=1

; LOD
r.StaticMeshLODDistanceScale=1.0
r.SkeletalMeshLODBias=0
r.LODFadeTime=0.5

; Niagara VFX quality
fx.Niagara.QualityLevel=2

; Foliage
foliage.CullDistanceScale=1.0
foliage.LODDistanceScale=1.0
grass.CullDistanceScale=1.0

[/Script/Engine.GameUserSettings]
; Scalability defaults (HIGH preset)
sg.ShadowQuality=3
sg.TextureQuality=3
sg.EffectsQuality=3
sg.FoliageQuality=3
sg.PostProcessQuality=3
sg.ResolutionQuality=75

[PerformanceBudgets]
; Frame time budgets (milliseconds)
TargetFPS_PC=60
TargetFPS_Console=30
FrameBudget_PC_ms=16.67
FrameBudget_Console_ms=33.33

; System budgets (% of frame budget)
SurvivalSystem_Budget_Pct=15
RenderingBudget_Pct=60
AIBudget_Pct=15
PhysicsBudget_Pct=10

; Survival system specifics
SurvivalComponent_TickRate_Hz=10
SurvivalComponent_MaxSimultaneous=50
SurvivalComponent_LOD_DisableDrain_Distance=500
SurvivalComponent_LOD_DisableAll_Distance=1000

; Draw call budget
MaxDrawCalls_PC=2000
MaxDrawCalls_Console=1200
MaxTriangles_PC=5000000
MaxTriangles_Console=2000000

; Memory budget
TexturePool_MB=2048
MeshPool_MB=512
AudioPool_MB=256
