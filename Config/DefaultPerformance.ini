; DefaultPerformance.ini — Transpersonal Game Studio
; Performance Optimizer Agent #04 — Cycle PROD_CYCLE_AUTO_20260630_001
; Target: 60fps PC High-End / 30fps Console
; Frame budget: 16.67ms (60fps) / 33.33ms (30fps)

[/Script/Engine.RendererSettings]
; Lumen Global Illumination
r.Lumen.Reflections.Allow=1
r.Lumen.DiffuseIndirect.Allow=1
r.Lumen.TraceMeshSDFs=1
r.Lumen.MaxTraceDistance=8000

; Nanite
r.Nanite.MaxPixelsPerEdge=1.0

; Shadow quality — balanced for 60fps
r.Shadow.MaxResolution=2048
r.Shadow.RadiusThreshold=0.02
r.Shadow.DistanceScale=0.8
r.Shadow.CSM.MaxCascades=3

; Occlusion culling
r.AllowOcclusionQueries=1
r.HZBOcclusion=1
r.MinScreenRadiusForLights=0.03
r.MinScreenRadiusForDepthPrepass=0.03

; LOD
r.StaticMeshLODDistanceScale=1.0
r.SkeletalMeshLODBias=0

; Sky atmosphere
r.SkyAtmosphere.FastSkyLUT=1

; Texture streaming
r.Streaming.PoolSize=1024
r.Streaming.MaxTempMemoryAllowed=50

; FPS cap
t.MaxFPS=60

[/Script/Engine.GameUserSettings]
; PC High-End scalability defaults
sg.ResolutionQuality=100
sg.ViewDistanceQuality=3
sg.AntiAliasingQuality=3
sg.ShadowQuality=3
sg.PostProcessQuality=3
sg.TextureQuality=3
sg.EffectsQuality=3
sg.FoliageQuality=2

[PerformanceBudgets]
; Frame budget breakdown (ms) for 60fps target
GameThread_ms=3.0
RenderThread_ms=5.0
GPU_ms=7.0
Physics_ms=1.5
AI_ms=1.0
Audio_ms=0.5
Overhead_ms=0.5

[LODDistances]
; LOD transition distances (Unreal units = cm)
NearLOD_cm=500
MidLOD_cm=2000
FarLOD_cm=5000
CullDistance_cm=8000

[TickRates]
; Recommended tick intervals for major systems
; Format: System=interval_seconds (0=every frame)
StaminaDrain_s=0.1
HungerThirstDecay_s=1.0
FearDecay_s=0.5
DinosaurAIPerception_s=0.25
FoliageManagerUpdate_s=2.0
WeatherSystemTick_s=10.0
CrowdSimulationUpdate_s=0.5
NavMeshRebuild_s=5.0
