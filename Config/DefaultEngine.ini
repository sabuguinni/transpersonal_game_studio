; DefaultEngine.ini — Performance Optimizer (Agent #4) verified settings
; Target: 60fps PC high-end / 30fps console

[/Script/EngineSettings.GameMapsSettings]
GameDefaultMap=/Game/Maps/MinPlayableMap
EditorStartupMap=/Game/Maps/MinPlayableMap
GlobalDefaultGameMode=/Script/TranspersonalGame.TranspersonalGameMode

[/Script/Engine.RendererSettings]
; Lumen GI — enabled for quality, tuned for performance
r.Lumen.DiffuseIndirect.Allow=1
r.Lumen.Reflections.Allow=1
r.Lumen.TraceMeshSDFs=1
r.Lumen.HardwareRayTracing=0
r.Lumen.ScreenProbeGather.DownsampleFactor=2

; Shadow quality — 2 cascades max for 60fps
r.Shadow.CSM.MaxCascades=2
r.Shadow.MaxResolution=1024
r.Shadow.DistanceScale=0.8

; Sky atmosphere
r.SkyAtmosphere.FastSkyLUT=1
r.SkyAtmosphere.AerialPerspectiveLUT.FastApplyOnOpaque=1

; HZB Occlusion — critical for open world
r.HZBOcclusion=1
r.AllowOcclusionQueries=1

; LOD
r.StaticMeshLODDistanceScale=1.0
r.SkeletalMeshLODBias=0
r.ForceLOD=-1

; Streaming
r.Streaming.PoolSize=2048
r.Streaming.MaxTempMemoryAllowed=50

; Anti-aliasing — TAA for quality/perf balance
r.AntiAliasingMethod=2
r.TemporalAA.Quality=2

; Texture streaming
r.Streaming.HiddenPrimitiveScale=0.5
r.Streaming.AmortizeCPUToGPUCopy=1

; Nanite — enable for landscape and large meshes
r.Nanite=1
r.Nanite.MaxPixelsPerEdge=1.0

; Virtual Shadow Maps (Nanite shadows)
r.Shadow.Virtual.Enable=1
r.Shadow.Virtual.ResolutionLodBiasDirectional=-0.5

; World Partition streaming
wp.Runtime.EnableServerStreaming=0

[/Script/Engine.Engine]
; Fixed frame rate target (editor preview)
bSmoothFrameRate=True
MinSmoothedFrameRate=22
MaxSmoothedFrameRate=62

[/Script/Engine.PhysicsSettings]
; Physics substeps for accurate dinosaur collision
bSubstepping=True
MaxSubstepDeltaTime=0.016667
MaxSubsteps=4
; Chaos solver
DefaultBroadphaseSettings=(bUseMBP=True,MBPBounds=(Min=(X=-200000,Y=-200000,Z=-200000),Max=(X=200000,Y=200000,Z=200000)),MBPNumSubdivisions=4)

[/Script/Engine.InputSettings]
; Input settings — axis/action mappings for TranspersonalCharacter
+AxisMappings=(AxisName="MoveForward",Scale=1.000000,Key=W)
+AxisMappings=(AxisName="MoveForward",Scale=-1.000000,Key=S)
+AxisMappings=(AxisName="MoveForward",Scale=1.000000,Key=Up)
+AxisMappings=(AxisName="MoveForward",Scale=-1.000000,Key=Down)
+AxisMappings=(AxisName="MoveRight",Scale=1.000000,Key=D)
+AxisMappings=(AxisName="MoveRight",Scale=-1.000000,Key=A)
+AxisMappings=(AxisName="MoveRight",Scale=1.000000,Key=Right)
+AxisMappings=(AxisName="MoveRight",Scale=-1.000000,Key=Left)
+AxisMappings=(AxisName="Turn",Scale=1.000000,Key=MouseX)
+AxisMappings=(AxisName="LookUp",Scale=-1.000000,Key=MouseY)
+AxisMappings=(AxisName="LookRight",Scale=1.000000,Key=MouseX)
+AxisMappings=(AxisName="LookUpRate",Scale=-1.000000,Key=MouseY)
+AxisMappings=(AxisName="Turn",Scale=1.000000,Key=Gamepad_RightX)
+AxisMappings=(AxisName="LookUp",Scale=-1.000000,Key=Gamepad_RightY)
+ActionMappings=(ActionName="Jump",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=SpaceBar)
+ActionMappings=(ActionName="Jump",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=Gamepad_FaceButton_Bottom)
+ActionMappings=(ActionName="Run",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=LeftShift)
+ActionMappings=(ActionName="Run",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=Gamepad_LeftThumbstick)

[/Script/Engine.GarbageCollectionSettings]
; GC tuning for open world — reduce hitches
gc.TimeBetweenPurgingPendingKillObjects=60.0
gc.MaxObjectsNotConsideredByGC=1
gc.SizeOfPermanentObjectPool=0

[ConsoleVariables]
; Performance CVars baked into config
r.SkyAtmosphere.FastSkyLUT=1
r.HZBOcclusion=1
r.AllowOcclusionQueries=1
r.Shadow.CSM.MaxCascades=2
r.Lumen.DiffuseIndirect.Allow=1
r.Streaming.PoolSize=2048
