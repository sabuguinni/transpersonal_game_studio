[/Script/Engine.RendererSettings]
; === TRANSPERSONAL GAME STUDIO — PERFORMANCE SETTINGS v1.0 ===
; Agent #04 Performance Optimizer — PROD_CYCLE_AUTO_20260623_001
; Target: 60fps PC high-end / 30fps console
; Applied via UE5 console commands and validated in MinPlayableMap

; --- LOD ---
r.ForceLOD=-1
r.LODFadeTime=0.5
r.StaticMeshLODDistanceScale=1.0

; --- SHADOWS ---
r.Shadow.MaxCSMResolution=2048
r.Shadow.CSM.MaxCascades=4
r.Shadow.DistanceScale=0.8

; --- OCCLUSION ---
r.HZBOcclusion=1
r.AllowOcclusionQueries=1

; --- TEXTURE STREAMING ---
r.Streaming.PoolSize=2048
r.Streaming.MaxTempMemoryAllowed=256

; --- LUMEN ---
r.Lumen.Reflections.Allow=1
r.Lumen.HardwareRayTracing=0

; --- NANITE ---
r.Nanite=1

; --- ANTI-ALIASING (TSR) ---
r.AntiAliasingMethod=4
r.TemporalAA.Upsampling=1
r.ScreenPercentage=100

; --- SKY ---
r.SkyAtmosphere.FastSkyLUT=1
r.SkyAtmosphere.AerialPerspectiveLUT.FastApply=1

; --- GC ---
gc.TimeBetweenPurgingPendingKillObjects=60

; --- SCALABILITY BASELINE (Epic) ---
sg.ShadowQuality=3
sg.TextureQuality=3
sg.EffectsQuality=3
sg.PostProcessQuality=3

