[/Script/Engine.RendererSettings]

; === ANTI-ALIASING ===
r.AntiAliasingMethod=4
; 4 = TSR (Temporal Super Resolution) — best quality/perf ratio in UE5.5

; === SHADOWS ===
r.ShadowQuality=3
r.Shadow.MaxResolution=2048
r.Shadow.CSM.MaxCascades=3
r.Shadow.CSM.TransitionScale=1.0
r.Shadow.RadiusThreshold=0.03
r.Shadow.DistanceScale=0.8

; === LUMEN ===
r.Lumen.DiffuseIndirect.Allow=1
r.Lumen.TraceMeshSDFs=1
r.Lumen.Reflections.MaxRoughnessToTrace=0.4
r.Lumen.ScreenProbeGather.ScreenSpeedupFactor=4
r.Lumen.ScreenProbeGather.FullResolutionJitterSpreadTolerance=1

; === SKY ATMOSPHERE ===
r.SkyAtmosphere.FastSkyLUT=1

; === OCCLUSION ===
r.HZBOcclusion=1
r.AllowOcclusionQueries=1
r.NumBufferedOcclusionQueries=1
r.OcclusionCullNumThreads=2

; === POST PROCESS ===
r.MotionBlurQuality=2
r.AmbientOcclusionLevels=2
r.AmbientOcclusionRadiusScale=1.0
r.DepthOfFieldQuality=2
r.BloomQuality=4
r.LensFlareQuality=1
r.SceneColorFringeQuality=0

; === STREAMING ===
r.Streaming.PoolSize=2048
r.Streaming.MaxTempMemoryAllowed=50

; === LOD ===
r.StaticMeshLODDistanceScale=1.0
r.SkeletalMeshLODBias=0

; === FOLIAGE ===
foliage.LODDistanceScale=0.75
foliage.DensityScale=1.0
foliage.MaxTrianglesToRender=100000000

; === PARTICLES ===
fx.MaxCPUParticlesPerEmitter=1000
fx.MaxGPUParticlesSpawnedPerFrame=500

; === TSR ===
r.TSR.History.SampleCount=16

[/Script/Engine.Engine]
; Survival tick: 1Hz per character, batched in GameState for crowd scenarios
; Budget: 50 chars * 0.01ms = 0.5ms (3% of 16.67ms frame budget at 60fps)
