; PerformanceTargets.ini
; Transpersonal Game Studio — Performance Optimizer Agent #04
; Frame budget targets and rendering quality settings
; Generated: PROD_CYCLE_AUTO_20260629_011

[/Script/Engine.RendererSettings]
; TAA upsampling for quality/perf balance
r.DefaultFeature.AntiAliasing=2
r.TemporalAA.Upsampling=1
r.TemporalAA.Quality=2

; Lumen — Software GI (no HW RT for console compatibility)
r.Lumen.Reflections.Allow=1
r.Lumen.HardwareRayTracing=0
r.Lumen.GlobalIllumination.Allow=1
r.Lumen.DiffuseIndirect.Allow=1

; Shadow quality
r.Shadow.MaxResolution=2048
r.Shadow.RadiusThreshold=0.03
r.Shadow.CSM.MaxCascades=3
r.FarShadowStaticMeshLODBias=1

; Occlusion culling
r.AllowOcclusionQueries=1
r.HZBOcclusion=1
r.OcclusionQueryLocation=1

; Nanite
r.Nanite.MaxPixelsPerEdge=1.0
r.Nanite.ProjectedAABBMinimumScreenSize=0.0

; HLOD
r.HLOD=1

; Sky atmosphere
r.SkyAtmosphere.FastSkyLUT=1

; LOD
r.StaticMeshLODDistanceScale=1.0

; Texture streaming
r.Streaming.PoolSize=1024
r.Streaming.MaxTempMemoryAllowed=50

; Foliage
foliage.CullDistanceScale=1.0
foliage.LODDistanceScale=1.0

; GC
gc.TimeBetweenPurgingPendingKillObjects=60

[PerformanceBudgets]
; PC High-End (target: 60fps)
PC_FrameBudget_ms=16.6
PC_GPU_Budget_ms=10.0
PC_CPU_Budget_ms=5.0
PC_DrawCall_Budget=2000
PC_Triangle_Budget=3000000
PC_TextureMemory_MB=4096

; Console (target: 30fps)
Console_FrameBudget_ms=33.3
Console_GPU_Budget_ms=20.0
Console_CPU_Budget_ms=10.0
Console_DrawCall_Budget=1000
Console_Triangle_Budget=1500000
Console_TextureMemory_MB=2048

[LODThresholds]
; Distance thresholds for LOD transitions (in cm)
LOD0_MaxDistance=1500
LOD1_MaxDistance=4000
LOD2_MaxDistance=8000
LOD3_MaxDistance=15000
CullDistance=20000

; Small props (rocks, debris) — aggressive culling
SmallProp_LOD0_MaxDistance=800
SmallProp_LOD1_MaxDistance=2000
SmallProp_CullDistance=4000

; Dinosaurs — generous LOD (gameplay critical)
Dinosaur_LOD0_MaxDistance=3000
Dinosaur_LOD1_MaxDistance=8000
Dinosaur_LOD2_MaxDistance=15000
Dinosaur_CullDistance=25000

[ShadowBudget]
; Cast shadow disabled for props smaller than this extent (cm)
SmallProp_ShadowCullExtent=50.0
; Dynamic shadow distance
DynamicShadowDistance=8000
; Static shadow distance
StaticShadowDistance=20000
