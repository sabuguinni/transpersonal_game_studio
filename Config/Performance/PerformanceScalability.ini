[/Script/Engine.GameUserSettings]
; === TRANSPERSONAL GAME STUDIO — PERFORMANCE SCALABILITY CONFIG ===
; Agent #04 Performance Optimizer — PROD_CYCLE_AUTO_20260624_009
; Targets: 60fps PC High-End / 30fps Console

; --- LOD Settings ---
; StaticMeshLODDistanceScale: 1.0 = engine default, increase to pop LODs sooner (cheaper)
r.StaticMeshLODDistanceScale=1.0
; SkeletalMeshLODBias: 0 = auto, positive = force lower LOD (cheaper animation)
r.SkeletalMeshLODBias=0

; --- Shadow Settings ---
; MaxResolution: 2048 = high quality, 1024 = console target
r.Shadow.MaxResolution=2048
r.Shadow.DistanceScale=1.0
; CSM: Cascaded Shadow Maps — 4 cascades for PC, 2 for console
r.Shadow.CSM.MaxCascades=4

; --- View Distance ---
r.ViewDistanceScale=1.0
; Foliage LOD distance — 1.0 = default, reduce to 0.5 on console
foliage.LODDistanceScale=1.0

; --- Streaming ---
; Pool size in MB — 2048 for PC, 512 for console
r.Streaming.PoolSize=2048
r.Streaming.MaxTempMemoryAllowed=50

; --- Sky Atmosphere (performance) ---
r.SkyAtmosphere.FastSkyLUT=1
r.SkyAtmosphere.AerialPerspectiveLUT.FastApply=1

; --- Lumen (Global Illumination) ---
; Software Lumen is cheaper than hardware ray tracing
r.Lumen.Reflections.Allow=1
r.Lumen.HardwareRayTracing=0
r.Lumen.ScreenProbeGather.RadianceCache.NumProbeTracesBudget=200

; --- Niagara VFX ---
; Limit particle count for performance
fx.Niagara.MaxCPUParticlesPerEmitter=2000
fx.Niagara.MaxGPUParticlesSpawnPerFrame=10000

; --- Anti-Aliasing ---
; TAA = Temporal Anti-Aliasing (good quality/perf balance)
r.AntiAliasingMethod=2

; --- Occlusion Culling ---
r.AllowOcclusionQueries=1
r.HZBOcclusion=1

[PerformancePresets.PC_High]
; PC High-End preset (RTX 3080+, 16GB RAM)
TargetFPS=60
ShadowQuality=High
TextureQuality=Epic
FoliageQuality=High
ViewDistance=Epic
AntiAliasing=TAA
PostProcessQuality=Epic

[PerformancePresets.Console]
; Console preset (PS5/Xbox Series X equivalent)
TargetFPS=30
ShadowQuality=Medium
TextureQuality=High
FoliageQuality=Medium
ViewDistance=High
AntiAliasing=TAA
PostProcessQuality=High

[PerformancePresets.PC_Low]
; Low-end PC (GTX 1060, 8GB RAM)
TargetFPS=30
ShadowQuality=Low
TextureQuality=Medium
FoliageQuality=Low
ViewDistance=Medium
AntiAliasing=FXAA
PostProcessQuality=Medium

; === FRAME BUDGET TARGETS ===
; PC High: 16.6ms/frame total
;   RenderThread: 8ms
;   GameThread:   4ms
;   GPU:          12ms
;   Headroom:     ~4ms
;
; Console: 33.3ms/frame total
;   RenderThread: 16ms
;   GameThread:   8ms
;   GPU:          25ms
;   Headroom:     ~8ms
;
; === SURVIVAL COMPONENT TICK BUDGET ===
; USurvivalComponent ticks at 1Hz (not 60Hz)
; Cost per tick: ~0.01ms (5 float comparisons + 5 float additions)
; Annual budget impact: NEGLIGIBLE
;
; === DINOSAUR SKELETAL MESH BUDGET ===
; Per dino (static pose, no animation): ~0.1ms render, ~0.0ms tick
; Per dino (animated): ~0.5ms game thread, ~1.0ms render
; 6 dinos animated: ~3ms game thread — within 4ms budget
; 6 dinos static: ~0.6ms render — well within budget
