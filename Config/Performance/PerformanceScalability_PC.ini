[/Script/Engine.RendererSettings]
; Lumen Global Illumination
r.Lumen.DiffuseIndirect.Allow=1
r.Lumen.Reflections.Allow=1
r.Lumen.TraceMeshSDFs.Allow=1
r.Lumen.ScreenProbeGather.RadianceCache.ProbesPerEmissiveMeshSample=4

; Shadow Quality (balanced for 60fps)
r.ShadowQuality=3
r.Shadow.MaxResolution=2048
r.Shadow.CSM.MaxCascades=3

; LOD & Streaming
r.StaticMesh.LODDistanceScale=1.0
r.SkeletalMesh.LODDistanceScale=1.0
r.SkeletalMesh.MinLodQualityLevel=0
r.Streaming.MipBias=0

; Anti-Aliasing
r.TemporalAA.Upsampling=1

; Occlusion Culling
r.HZBOcclusion=1
r.AllowOcclusionQueries=1

; Foliage
foliage.LODDistanceScale=1.5

; Nanite
r.Nanite.MaxPixelsPerEdge=1.0

; Texture
r.MaxAnisotropy=8

; Sky Atmosphere
r.SkyAtmosphere.FastSkyLUT=1
r.SkyAtmosphere.AerialPerspectiveLUT.FastApply=1

[FrameBudget_PC_High]
