; Headroom:                        9.31ms

[DinoTickBudget]
; SurvivalComponent: 1.0s interval via AccumulatedTime accumulator
; At 60fps = 60 tick calls/sec, drain fires every 60th call
; CPU cost per tick: ~0.001ms (float comparison only)
; 5 dinos * 0.001ms = 0.005ms total — WELL within budget

; DinosaurBase AI tick: 0.1s interval (set via set_actor_tick_interval)
; 5 dinos * 10 ticks/sec = 50 AI ticks/sec
; CPU cost per AI tick: ~0.05ms (BT evaluation)
; 5 dinos * 0.05ms = 0.25ms total — ACCEPTABLE

