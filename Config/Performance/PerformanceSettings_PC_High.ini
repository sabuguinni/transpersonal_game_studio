; PerformanceSettings_PC_High.ini
; Agent #04 — Performance Optimizer | PROD_CYCLE_AUTO_20260622_002
; Target: 60fps on high-end PC (RTX 3080+, 16GB RAM, Ryzen 7+)
; Applied via UE5 console commands each session start

[/Script/Engine.RendererSettings]
; Nanite — virtualized geometry for static meshes
r.Nanite.MaxPixelsPerEdge=1.0
r.Nanite.Streaming.AsyncCompute=1
r.Nanite.AllowMasked=1

; Lumen — global illumination (performance-balanced)
r.Lumen.Reflections.Allow=1
r.Lumen.DiffuseIndirect.Allow=1
r.Lumen.TraceMeshSDFs.Allow=1
r.Lumen.ScreenProbeGather.RadianceCache.NumProbesToTraceBudget=200
r.Lumen.ScreenProbeGather.DownsampleFactor=2
r.Lumen.TranslucencyReflections.FrontLayer.Allow=1

; Shadows — CSM balanced for 60fps
r.Shadow.MaxCSMResolution=2048
r.Shadow.CSM.MaxCascades=3
r.Shadow.DistanceScale=0.8
r.Shadow.RadiusThreshold=0.03
r.Shadow.MaxResolution=2048
r.Shadow.Virtual.Enable=1

; LOD — aggressive for distant objects
r.StaticMeshLODDistanceScale=1.0
r.SkeletalMeshLODBias=0
r.ForceLOD=-1

; Texture streaming
r.Streaming.PoolSize=2048
r.Streaming.MaxTempMemoryAllowed=256
r.TextureStreaming=1
r.Streaming.UseFixedPoolSize=0
r.MaxAnisotropy=8

; Occlusion culling
r.HZBOcclusion=1
r.OcclusionQueryLocation=1
r.AllowOcclusionQueries=1

; Screen percentage (TAA upscaling)
r.ScreenPercentage=100
r.TemporalAA.Upsampling=1

; Sky atmosphere (fast path)
r.SkyAtmosphere.FastSkyLUT=1
r.SkyAtmosphere.AerialPerspectiveLUT.FastApply=1

[/Script/Engine.GameUserSettings]
; PC High preset baseline
sg.ResolutionQuality=100
sg.ViewDistanceQuality=3
sg.AntiAliasingQuality=3
sg.ShadowQuality=3
sg.GlobalIlluminationQuality=3
sg.ReflectionQuality=3
sg.PostProcessQuality=3
sg.TextureQuality=3
sg.EffectsQuality=3
sg.FoliageQuality=3
sg.ShadingQuality=3

[PerformanceBudget]
; Frame budget targets (ms)
TargetFPS_PC=60
TargetFPS_Console=30
FrameBudget_PC_ms=16.6
FrameBudget_Console_ms=33.3

; Estimated costs per actor type (ms, rough)
Cost_DynamicLight_ms=0.5
Cost_SkeletalMesh_ms=0.3
Cost_Landscape_ms=1.0
Cost_BaseOverhead_ms=4.0

; Actor count caps
MaxDynamicLights=8
MaxSkeletalMeshActors=50
MaxStaticMeshActors=500
MaxTotalActors=200

; Dinosaur-specific budgets
MaxDinosaurAIActive=12
MaxDinosaurAIVisible=20
MaxDinosaurAITotal=50
DinosaurLOD_Distance_High=2000
DinosaurLOD_Distance_Medium=5000
DinosaurLOD_Distance_Low=10000
DinosaurCull_Distance=15000
