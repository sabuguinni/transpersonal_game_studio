; ============================================================
; Transpersonal Game Studio — Performance Scalability Config
; Agent #04 Performance Optimizer | PROD_CYCLE_AUTO_20260625_003
; Target: 60fps PC High-End / 30fps Console
; ============================================================

[/Script/Engine.RendererSettings]
; Shadow quality
r.Shadow.MaxResolution=2048
r.Shadow.RadiusThreshold=0.03
r.Shadow.DistanceScale=1.0
r.Shadow.CSM.MaxCascades=4

; Lumen GI (enabled for visual quality)
r.Lumen.Reflections.Allow=1
r.Lumen.DiffuseIndirect.Allow=1
r.Lumen.GlobalIllumination.MaxTraceDistance=20000
r.Lumen.Reflections.MaxTraceDistance=10000

; LOD
r.SkeletalMeshLODBias=0
r.StaticMeshLODBias=0
r.ForceLOD=-1
foliage.LODDistanceScale=1.5

; Texture streaming
r.Streaming.PoolSize=2048
r.Streaming.MaxTempMemoryAllowed=256
r.MaxAnisotropy=8

; Anti-aliasing
r.TemporalAA.Upsampling=1
r.ScreenPercentage=100

; VSync (off in editor, on in shipping)
r.VSync=0

[/Script/Engine.GameUserSettings]
; PC High-End preset
sg.ResolutionQuality=100
sg.ViewDistanceQuality=3
sg.AntiAliasingQuality=3
sg.ShadowQuality=3
sg.GlobalIlluminationQuality=3
sg.ReflectionQuality=3
sg.PostProcessQuality=3
sg.TextureQuality=3
sg.EffectsQuality=3
sg.FoliageQuality=3
sg.ShadingQuality=3

[/Script/Engine.GameUserSettings.Console]
; Console (30fps) preset
sg.ResolutionQuality=75
sg.ViewDistanceQuality=2
sg.AntiAliasingQuality=2
sg.ShadowQuality=2
sg.GlobalIlluminationQuality=2
sg.ReflectionQuality=2
sg.PostProcessQuality=2
sg.TextureQuality=2
sg.EffectsQuality=2
sg.FoliageQuality=1
sg.ShadingQuality=2

; ============================================================
; DINOSAUR LOD TICK BUDGET (DinosaurBase.cpp)
; Distance thresholds for tick rate reduction:
;   < 2000 units  → 60Hz (LODTickIntervals[0] = 0.016s)
;   2000-5000     → 30Hz (LODTickIntervals[1] = 0.033s)
;   5000-10000    → 10Hz (LODTickIntervals[2] = 0.100s)
;   > 10000       →  2Hz (LODTickIntervals[3] = 0.500s)
; ============================================================

[PerformanceBudgets]
; Frame budget targets (milliseconds)
TargetFrameTimePC_ms=16.67
TargetFrameTimeConsole_ms=33.33

; Draw call budgets
MaxDrawCallsPC=3000
MaxDrawCallsConsole=1500

; Shadow caster budget
MaxShadowCastersPC=500
MaxShadowCastersConsole=200

; Skeletal mesh budget
MaxSkeletalMeshActors=50
MaxSimultaneousRagdolls=5

; Particle/Niagara budget
MaxNiagaraParticles=50000
MaxNiagaraSystems=20

; Memory budgets (MB)
TextureStreamingPoolMB=2048
MeshStreamingPoolMB=512
AudioPoolMB=256

; ============================================================
; INSTANCING POLICY
; Static meshes with >3 instances in scene → HISM candidates
; Foliage always uses HISM (Hierarchical Instanced Static Mesh)
; Trees, rocks, grass: ALWAYS instanced, never individual actors
; ============================================================

[InstancingPolicy]
MinInstancesForHISM=3
FoliageAlwaysHISM=true
RockAlwaysHISM=true
GrassAlwaysHISM=true
