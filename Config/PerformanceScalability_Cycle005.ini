; ============================================================
; SCALABILITY GROUPS (UE5 standard sg.* commands)
; ============================================================
[ScalabilityGroups]
; sg.ResolutionQuality 100 = native, 75 = 75% res, 50 = half
; sg.ViewDistanceQuality 0-3
; sg.AntiAliasingQuality 0-3
; sg.ShadowQuality 0-3
; sg.PostProcessQuality 0-3
; sg.TextureQuality 0-3
; sg.EffectsQuality 0-3
; sg.FoliageQuality 0-3
; sg.ShadingQuality 0-3

; PC High = all at 3
; Console Medium = shadow/foliage/effects at 2, rest at 3
; PC Low = all at 1 (fallback for weak hardware)

; ============================================================
; DINOSAUR AI PERFORMANCE RULES
; ============================================================
[DinoAIPerformance]
; Full behavior tree tick: within DinoFullAIRange of player
; Simplified tick (patrol only): DinoFullAIRange to DinoSimplifiedAIRange
; Culled (no tick): beyond DinoSimplifiedAIRange
; Attack cooldown minimum: 1.5s (prevents spam)
; Perception update rate: 0.1s (10Hz)
; Max simultaneous chasers per player: 3 (prevents pile-on)
; Hunger drain interval: 10s (not every frame)
; Corpse lifetime: 30s then SetLifeSpan destroys

; ============================================================
; FOLIAGE PERFORMANCE RULES
; ============================================================
[FoliagePerformance]
; Use HISM (Hierarchical Instanced Static Mesh) for all repeated foliage
; Individual actor foliage is PROHIBITED for >10 instances of same mesh
; Grass: use Landscape Grass Output (not placed actors)
; Trees: HISM, max 500 per HISM component
; Rocks: HISM, max 200 per HISM component
; All foliage must have LOD1 (50% reduction) and LOD2 (25% of original)
; Cull distance: trees=3000, rocks=2500, grass=1500, bushes=2000

; ============================================================
; LIGHTING PERFORMANCE RULES
; ============================================================
[LightingPerformance]
; Directional light: 1 only (the sun)
; SkyLight: 1 only, real_time_capture=True
; ExponentialHeightFog: 1 only
; Dynamic point lights: max 20 PC / max 8 console
; All campfire/torch lights: use stationary not movable
; Shadow casting point lights: max 4 simultaneous
; Lumen: enabled on PC High, reflections disabled on console
