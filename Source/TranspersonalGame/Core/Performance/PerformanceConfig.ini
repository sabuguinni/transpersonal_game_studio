; PerformanceConfig.ini
; Transpersonal Game Studio — Agent #04 Performance Optimizer
; Target: 60fps PC (Epic settings) / 30fps Console (High settings)
; Cycle: PROD_CYCLE_AUTO_20260623_004

[/Script/Engine.RendererSettings]
; Lumen — Global Illumination
r.Lumen.Reflections.Allow=1
r.Lumen.DiffuseIndirect.Allow=1
r.Lumen.TraceMeshSDFs.Allow=1
r.Lumen.MaxTraceDistance=20000
r.Lumen.Scene.SurfaceCacheResolution=1.0

; Nanite — Virtualized Geometry
r.Nanite=1
r.Nanite.MaxPixelsPerEdge=1.0
r.Nanite.Tessellation=0

; Shadows — Cascaded Shadow Maps
r.Shadow.MaxResolution=2048
r.Shadow.CSM.MaxCascades=3
r.Shadow.DistanceScale=1.0
r.Shadow.RadiusThreshold=0.03

; TSR — Temporal Super Resolution (UE5.5 preferred AA)
r.AntiAliasingMethod=4
r.TSR.History.ScreenPercentage=200
r.TSR.ShadingRejection.Flickering.Period=3

; Sky Atmosphere
r.SkyAtmosphere.FastSkyLUT=1
r.SkyAtmosphere.AerialPerspectiveLUT.FastApply=1

; LOD
r.StaticMeshLODDistanceScale=1.0
r.SkeletalMeshLODBias=0
foliage.LODDistanceScale=1.0
r.ViewDistanceScale=1.0
r.DetailMode=2

; Occlusion Culling
r.HZBOcclusion=1
r.AllowOcclusionQueries=1
r.OcclusionQueryLocation=1

[/Script/Engine.GameSession]
; GC — Garbage Collection tuning for many actors
gc.TimeBetweenPurgingPendingKillObjects=60
gc.MaxObjectsNotConsideredByGC=1

[/Script/Engine.GameNetworkManager]
; Streaming
s.AsyncLoadingTimeLimit=5
s.PriorityAsyncLoadingExtraTime=15

[/Script/Engine.CharacterMovementComponent]
; Character movement simulation budget
p.MaxSimulationIterations=8
p.MaxSimulationTimeStep=0.05

; ============================================================
; SCALABILITY PRESETS
; ============================================================
[ScalabilityGroups_PC_Epic]
sg.ResolutionQuality=100
sg.ShadowQuality=3
sg.TextureQuality=3
sg.EffectsQuality=3
sg.FoliageQuality=3
sg.ShadingQuality=3

[ScalabilityGroups_Console_High]
sg.ResolutionQuality=75
sg.ShadowQuality=2
sg.TextureQuality=2
sg.EffectsQuality=2
sg.FoliageQuality=2
sg.ShadingQuality=2

