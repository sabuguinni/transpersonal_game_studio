[/Script/Engine.RendererSettings]
; === TRANSPERSONAL GAME STUDIO — PERFORMANCE CONFIG v3 ===
; Target: 60fps PC (RTX 3070+) / 30fps Console (PS5/XSX)
; Agent: #04 Performance Optimizer | PROD_CYCLE_AUTO_20260622_001

; --- SHADOW QUALITY ---
r.Shadow.MaxResolution=1024
r.Shadow.CSM.MaxCascades=3
r.Shadow.DistanceScale=0.8
r.Shadow.RadiusThreshold=0.03

; --- LUMEN GI ---
r.Lumen.Reflections.Allow=1
r.Lumen.TraceMeshSDFs=1
r.Lumen.GlobalIllumination.MaxTraceDistance=8000
r.Lumen.DiffuseIndirect.Allow=1
r.Lumen.ScreenProbeGather.RadianceCache.NumProbesToTraceBudget=200

; --- NANITE ---
r.Nanite=1
r.Nanite.MaxPixelsPerEdge=1.0

; --- TEXTURE STREAMING ---
r.TextureStreaming=1
r.Streaming.UseFixedPoolSize=1
r.Streaming.PoolSize=768
r.Streaming.MipBias=0
r.Streaming.MaxTempMemoryAllowed=64

; --- ANTI-ALIASING (TSR) ---
r.AntiAliasingMethod=4
r.TSR.History.ScreenPercentage=100
r.TSR.Velocity.WeightClampingSampleCount=4

; --- OCCLUSION CULLING ---
r.HZBOcclusion=1
r.OcclusionCullParallelPrimFetch=1
r.MinScreenRadiusForLights=0.03
r.MinScreenRadiusForDepthPrepass=0.03

; --- LOD ---
r.StaticMeshLODDistanceScale=1.0
r.SkeletalMeshLODBias=0
r.ForceLOD=-1

; --- POST PROCESS ---
r.DepthOfFieldQuality=2
r.MotionBlurQuality=2
r.BloomQuality=4
r.AmbientOcclusionLevels=2

; --- SKY ATMOSPHERE ---
r.SkyAtmosphere.FastSkyLUT=1
r.SkyAtmosphere.AerialPerspectiveLUT.FastApply=1

; --- FOLIAGE ---
foliage.CullDistanceScale=1.0
grass.CullDistanceScale=1.0

; --- AI / NAVMESH ---
ai.NavMesh.UpdateInterval=0.1

; === LOD THRESHOLDS FOR DINOSAURS ===
; T-Rex:        LOD0=0-3000cm  LOD1=3000-6000cm  LOD2=6000-10000cm  Cull=10000cm
; Raptor:       LOD0=0-2000cm  LOD1=2000-4500cm  LOD2=4500-8000cm   Cull=8000cm
; Brachiosaurus:LOD0=0-4000cm  LOD1=4000-8000cm  LOD2=8000-12000cm  Cull=12000cm
; Small fauna:  LOD0=0-1500cm  LOD1=1500-3000cm  Cull=3000cm

; === FRAME BUDGET (60fps = 16.67ms) ===
; CPU Game Thread:    4.0ms  (AI ticks, physics, input)
; CPU Render Thread:  3.5ms  (draw call submission)
; GPU:                9.0ms  (rasterize, Lumen, post-process)
; Headroom:           0.17ms (safety margin)

; === DRAW CALL BUDGET ===
; Static meshes (terrain, rocks, trees):  ~120 draw calls
; Skeletal meshes (dinos, character):     ~40 draw calls  (5 dinos × 4 + char × 4 + shadow × 2)
; Dynamic lights:                         ~10 draw calls
; VFX/particles:                          ~20 draw calls
; TOTAL TARGET:                           <200 draw calls for 60fps
